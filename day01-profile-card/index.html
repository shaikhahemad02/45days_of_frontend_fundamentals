<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article class="profile-card">
        <div class="profile-card__image">
            <img src="https://cdn.jsdelivr.net/gh/alohe/memojis/png/memo_1.png" alt="Profile Picture">
        </div>
        <div class="profile-card-info">
            <h2 class="profile-card-info_name">Ahemad Shaikh</h2>
            <p class="profile-card-info_title">Web Developer</p>
            <p class="profile-card-info_bio">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
            <div class="profile-card-info_social">
                <ul class="profile-card-info_social_ul">
                    <li class="profile-card-info_social-item"><a href="https://twitter.com" class="profile-card-info_social-link">Twitter</a></li>
                    <li class="profile-card-info_social-item"><a href="https://linkedin.com" class="profile-card-info_social-link">LinkedIn</a></li>
                    <li class="profile-card-info_social-item"><a href="https://github.com/shaikhahemad02" class="profile-card-info_social-link">GitHub</a></li>       
                </ul>
            </div>
        </div>
    </article>
</body>
</html>
