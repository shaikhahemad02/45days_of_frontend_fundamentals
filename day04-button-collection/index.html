<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="btncollection">
        <p class="btnheading">Button Collection vertical</p>
        <button class="btn-primary btn">Primary</button>
        <button class="btn-secondary btn">Scondary</button>
        <button class="btn-outline btn">Outline</button>
        <button class="btn-ghost btn">Ghost</button>
        <button class="btn-disabled btn" disabled>Disabled</button>
        <button class="btn-danger btn">Danger</button>
        <button class="btn btn-primary btn-sm">Small Primary</button>
        <button class="btn btn-primary btn-lg">Large Primary</button>
    </div>
    <div class="btncollectionflex">
        <p class="btnheading">Button Collection Horizontal</p>
        <button class="btn-primary btn">Primary</button>
        <button class="btn-secondary btn">Scondary</button>
        <button class="btn-outline btn">Outline</button>
        <button class="btn-ghost btn">Ghost</button>
        <button class="btn-disabled btn" disabled>Disabled</button>
        <button class="btn-danger btn">Danger</button>
        <button class="btn btn-primary btn-sm">Small Primary</button>
        <button class="btn btn-primary btn-lg">Large Primary</button>
    </div>
</body>
</html>
