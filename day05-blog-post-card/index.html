<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blog-card">
    <img src="https://wallpaperaccess.com/full/2525137.jpg" alt="blogthumbnail" class="card-thumbnail">
    <span class="badge">Web Dev</span>
    <div class="blog-card-content">
        <h3 class="blog-card-header">No Stack to Full Stack</h3>
        <p class="blog-card-excerpt">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ab possimus velit, nobis officiis nostrum quos doloribus deserunt dolorem debitis dolorum.</p>
        <div class="blog-card-meta">
            <img src="https://cdn.jsdelivr.net/gh/alohe/memojis/png/memo_1.png" alt="author-avatar" class="blog-avtar">
            <span class="blog-author">Ahemad Shaikh</span>
            <span class="blog-date">July 11, 2026</span>
        </div>
        <a href="#" class="blog-readmore">Read More →</a>
    </div>
    </div>
</body>
</html>
