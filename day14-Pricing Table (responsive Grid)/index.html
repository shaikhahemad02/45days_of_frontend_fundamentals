<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Card (Responsive Grid)</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class = "pricing-cards">
        <div class="basic">
            <div class="card-content">
                <h2 class="plan-name"> E3 Basic </h2>
                <span class="plan-price"> $7/mo</span>
                <ul class = "plan-features">
                    <li>Power Apps</li>
                    <li>Power Automate</li>
                    <li>SharePoint</li>
                </ul>
                <button type="button" class="purchase">Purchase</button>
            </div>
        </div>
        <div class="standard">
            <div class="card-content">
                <h2 class = "plan-name">E3 Standard</h2>
                <span class = "plan-price">$17/mo</span>
                <ul class="plan-features">
                    <li>Power Automate</li>
                    <li>Data Verse</li>
                    <li>Power BI</li>
                    <li>SharePoint</li>
                </ul>
                <button type="button" class="purchase">Purchase</button>
            </div>
        </div>
        <div class="premium">
            <div class="card-content">
            <h2 class="plan-name">E5 Premium</h2>
            <span class ="plan-price">$25/mo</span>
            <ul class="plan-features">
                <li>Power Apps</li>
                    <li>Power Automate</li>
                    <li>Data Verse</li>
                    <li>Power BI</li>
                    <li>SharePoint</li>
                    <li>Copilot Studio</li>
                    <li>Power Pages</li>
            </ul>
                <button type="button" class="purchase">Purchase</button>
            </div>
        </div>
    </div>
</body>
</html>
