<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="alert-group">
    <div class="alert alert-success">
    <button class="close" type="button">X</button>
    <div class="alert-inner-box">
        <span class="alert-icon">✅</span>
        <span class="alert-message">Saved Successfuly.</span>
    </div>
    </div>
    <div class="alert alert-warning">
    <button class="close" type="button">X</button>
    <div class="alert-inner-box">
        <span class="alert-icon">⚠️</span>
        <span class="alert-message">Please sign in to unlock full features.</span>
    </div>
    </div>
    <div class="alert alert-error">
    <button class="close" type="button">X</button>
    <div class="alert-inner-box">
        <span class="alert-icon">❌</span>
        <span class="alert-message">Something went wrong, please try again later.</span>
    </div>
    </div>
    <div class="alert alert-info">
    <button class="close" type="button">X</button>
    <div class="alert-inner-box">
        <span class="alert-icon">ℹ️</span>
        <span class="alert-message">Unlock full features by signing in.</span>
    </div>
    </div>
</div>
</body>
</html>
