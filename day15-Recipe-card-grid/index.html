<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Card Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="recipe-grid">
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/chicken-tikka.png" alt="chiken-tikka"></div>
            <h3>Chicken Tikka</h3>
            <p>⏱️ 110 mins . 🔥 Hard</p>
        </div>
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/chiken-biryani.png" alt="chicken-biryani"></div>
            <h3>Chicken Biryani</h3>
            <p>⏱️ 130 mins . 🔥 Hard</p>
        </div>
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/samosa.png" alt="Samosa"></div>
            <h3>Samosa</h3>
            <p>⏱️ 30 mins . 🔥 Easy</p>
        </div>
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/lamb-curry.png" alt="lamb-curry"></div>
            <h3>Lamb Curry</h3>
            <p>⏱️ 90 mins . 🔥 Hard</p>
        </div>
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/paneeer-masala.png" alt="paneer-masla"></div>
            <h3>Paneer Butter Masala</h3>
            <p>⏱️ 40 mins . 🔥 Medium</p>
        </div>
        <div class="recipe-card">
            <div class="recipe-img-wrapper"><img src="/images/traditional-thali.png" alt="thali"></div>
            <h3>Traditional Thali</h3>
            <p>⏱️ 150 mins . 🔥 Medium</p>
        </div>
    </div>
    
</body>
</html>
