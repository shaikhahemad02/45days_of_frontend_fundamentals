<!DOCTYPE html>
<html lang="en">
<head>

    <title>Testimonial Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="testimonial-card">
        <span class="card-rating">⭐⭐⭐⭐⭐</span>

            Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam harum, recusandae magni itaque amet vero.
        </blockquote>
        <div class="testimonial-author">
            <img src="https://cdn.jsdelivr.net/gh/alohe/memojis/png/memo_1.png" alt="avatar" class="avatar">
            <span class="author-name">AHEMAD SHAIKH</span>
            <span class="job-title">CEO, Air Inc.</span>
        </div>
    </div>
